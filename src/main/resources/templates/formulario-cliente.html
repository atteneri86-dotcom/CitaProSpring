<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CitaPro - Clientes</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4a6cf7;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- FORMULARIO -->
    <div class="card">
        <h2 th:text="${cliente.id != null} ? 'Editar cliente' : 'Nuevo cliente'"></h2>

        <form th:action="@{/guardar-cliente}" th:object="${cliente}" method="post">

            <!-- IMPORTANTE PARA EDITAR -->
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" th:field="*{telefono}">
                <div class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
            </div>

            <button type="submit">Guardar cliente</button>
        </form>
    </div>

    <!-- TABLA -->
    <div class="card">
        <h2>Clientes guardados</h2>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.id}"></td>
                <td th:text="${cliente.nombre}"></td>
                <td th:text="${cliente.email}"></td>
                <td th:text="${cliente.telefono}"></td>
                <td>
                    <a th:href="@{/editar/{id}(id=${cliente.id})}">Editar</a> |
                    <a th:href="@{/borrar/{id}(id=${cliente.id})}"
                       onclick="return confirm('¿Seguro que quieres borrar este cliente?')">
                        Borrar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
