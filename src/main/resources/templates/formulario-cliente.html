<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CitaPro Canarias</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f7fa;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .subtitulo {
            text-align: center;
            color: gray;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>CitaPro Canarias</h1>
    <p class="subtitulo">Gestión básica de clientes</p>

    <div class="card">
        <h2 th:text="${cliente.id != null} ? 'Editar cliente' : 'Nuevo cliente'"></h2>

        <form th:action="@{/guardar-cliente}" th:object="${cliente}" method="post">

            <input type="hidden" th:field="*{id}" />

            <label>Nombre</label>
            <input type="text" th:field="*{nombre}">
            <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>

            <label>Email</label>
            <input type="email" th:field="*{email}">
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label>Teléfono</label>
            <input type="text" th:field="*{telefono}">
            <div class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>

            <button class="btn" type="submit"
                    th:text="${cliente.id != null} ? 'Actualizar cliente' : 'Guardar cliente'">
            </button>
        </form>
    </div>

    <div class="card">
        <h2>Clientes guardados</h2>

        <table border="1" width="100%">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>

            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.id}"></td>
                <td th:text="${cliente.nombre}"></td>
                <td th:text="${cliente.email}"></td>
                <td th:text="${cliente.telefono}"></td>
                <td>
                    <a th:href="@{/editar-cliente/{id}(id=${cliente.id})}">Editar</a> |
                    <a th:href="@{/borrar-cliente/{id}(id=${cliente.id})}">Borrar</a>
                </td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
