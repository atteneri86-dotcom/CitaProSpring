<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>CitaPro - Clientes</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }

        h1, h2 {
            margin-top: 0;
            color: #0f172a;
        }

        .subtitulo {
            color: #475569;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-delete {
            background: #dc2626;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: white;
            overflow: hidden;
            border-radius: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #eff6ff;
            color: #1e3a8a;
        }

        tr:hover {
            background: #f8fafc;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header p {
            color: #475569;
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>📅 CitaPro Canarias - Gestión de Clientes</h1>
        <p>Gestión básica de clientes</p>
    </div>

    <div class="card">
        <h2>Nuevo cliente</h2>
        <p class="subtitulo">Introduce los datos y pulsa en guardar.</p>

        <form th:action="@{/guardar-cliente}" th:object="${cliente}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}" placeholder="Ej. Ana Pérez" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input id="telefono" type="text" th:field="*{telefono}" placeholder="Ej. 600123123" required>
                </div>

                <div class="form-group full">
                    <label for="email">Email</label>
                    <input id="email" type="email" th:field="*{email}" placeholder="Ej. ana@email.com" required>
                </div>

                <div class="form-group full">
                    <button class="btn" type="submit">Guardar cliente</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Clientes guardados</h2>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${listaClientes}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.nombre}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.telefono}"></td>
                <td>
                    <a class="btn btn-delete"
                       th:href="@{/eliminar-cliente/{id}(id=${c.id})}"
                       onclick="return confirm('¿Seguro que quieres eliminar este cliente?');">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
